events {

}
http {
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

resolver 127.0.0.11 ipv6=off valid=30s;

server {
    listen 80;

    location = /startup/logger {
        return 302 /jellyfin/startup/logger;
    }

    location = /transmission {
        return 301 /transmission/;
    }

    location /transmission/ {
        set $transmission_upstream {{TRANSMISSION_UPSTREAM_URL}};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_pass $transmission_upstream;
    }

    location = /lidarr {
        return 301 /lidarr/;
    }

    location /lidarr/ {
        set $lidarr_upstream {{LIDARR_UPSTREAM_URL}};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /lidarr;
        proxy_pass $lidarr_upstream;
    }

    location = /radarr {
        return 301 /radarr/;
    }

    location /radarr/ {
        set $radarr_upstream {{RADARR_UPSTREAM_URL}};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /radarr;
        proxy_pass $radarr_upstream;
    }

    location = /sonarr {
        return 301 /sonarr/;
    }

    location /sonarr/ {
        set $sonarr_upstream {{SONARR_UPSTREAM_URL}};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /sonarr;
        proxy_pass $sonarr_upstream;
    }

    location = /prowlarr {
        return 301 /prowlarr/;
    }

    location /prowlarr/ {
        set $prowlarr_upstream {{PROWLARR_UPSTREAM_URL}};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /prowlarr;
        proxy_pass $prowlarr_upstream;
    }

    location = /flaresolverr {
        return 301 /flaresolverr/;
    }

    location /flaresolverr/ {
        set $flaresolverr_upstream {{FLARESOLVERR_UPSTREAM_URL}};
        rewrite ^/flaresolverr/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /flaresolverr;
        proxy_pass $flaresolverr_upstream;
    }

    location = /jellyseerr {
        return 301 /jellyseerr/;
    }

    location /jellyseerr/ {
        set $jellyseerr_upstream {{JELLYSEERR_UPSTREAM_URL}};
        rewrite ^/jellyseerr/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /jellyseerr;
        proxy_set_header Accept-Encoding "";
        proxy_redirect ~^/(.*)$ /jellyseerr/$1;
        sub_filter_types text/html application/json;
        sub_filter_once off;
        sub_filter 'href="/' 'href="/jellyseerr/';
        sub_filter 'src="/' 'src="/jellyseerr/';
        sub_filter 'content="/' 'content="/jellyseerr/';
        sub_filter 'url":"/' 'url":"/jellyseerr/';
        sub_filter '"applicationUrl":""' '"applicationUrl":"/jellyseerr"';
        proxy_pass $jellyseerr_upstream;
    }

    location = /jellyfin {
        return 301 /jellyfin/;
    }

    location /jellyfin/ {
        set $jellyfin_upstream {{JELLYFIN_UPSTREAM_URL}};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /jellyfin;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass $jellyfin_upstream;
    }

    location = /dashboard {
        return 301 /dashboard/;
    }

    location /dashboard/ {
        set $dashboard_upstream {{DASHBOARD_UPSTREAM_URL}};
        rewrite ^/dashboard/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /dashboard;
        proxy_set_header Accept-Encoding "";
        proxy_redirect ~^/(.*)$ /dashboard/$1;
        sub_filter_types text/html application/json text/css application/javascript;
        sub_filter_once off;
        sub_filter 'href="/' 'href="/dashboard/';
        sub_filter 'src="/' 'src="/dashboard/';
        sub_filter 'content="/' 'content="/dashboard/';
        proxy_pass $dashboard_upstream;
    }

    location = /immich {
        return 301 /immich/;
    }

    location /immich/ {
        set $immich_upstream {{IMMICH_UPSTREAM_URL}};
        rewrite ^/immich/(.*)$ /$1 break;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /immich;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Accept-Encoding "";
        proxy_redirect ~^/(.*)$ /immich/$1;
        sub_filter_types text/html application/json text/css application/javascript;
        sub_filter_once off;
        sub_filter 'href="/' 'href="/immich/';
        sub_filter 'src="/' 'src="/immich/';
        sub_filter 'content="/' 'content="/immich/';
        sub_filter 'url":"/' 'url":"/immich/';
        proxy_pass $immich_upstream;
    }

    location = /portainer {
        return 301 /portainer/;
    }

    location /portainer/ {
        set $portainer_upstream {{PORTAINER_UPSTREAM_URL}};
        rewrite ^/portainer/(.*)$ /$1 break;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /portainer;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Accept-Encoding "";
        proxy_redirect ~^/(.*)$ /portainer/$1;
        sub_filter_types text/html application/json text/css application/javascript;
        sub_filter_once off;
        sub_filter 'href="/' 'href="/portainer/';
        sub_filter 'src="/' 'src="/portainer/';
        sub_filter 'content="/' 'content="/portainer/';
        proxy_pass $portainer_upstream;
    }

    location = /yacht {
        return 301 /yacht/;
    }

    location /yacht/ {
        set $yacht_upstream {{YACHT_UPSTREAM_URL}};
        rewrite ^/yacht/(.*)$ /$1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /yacht;
        proxy_set_header Accept-Encoding "";
        proxy_redirect ~^/(.*)$ /yacht/$1;
        sub_filter_types text/html application/json text/css application/javascript;
        sub_filter_once off;
        sub_filter 'href="/' 'href="/yacht/';
        sub_filter 'src="/' 'src="/yacht/';
        sub_filter 'content="/' 'content="/yacht/';
        proxy_pass $yacht_upstream;
    }

    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }
}
}
